<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Akhil Bharatiya Vidyarthi Parishad (ABVP)</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:linear-gradient(135deg,#ff9933,#ffffff);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
padding:20px;
}

.card{
background:#fff;
width:100%;
max-width:420px;
padding:35px;
border-radius:18px;
box-shadow:0 10px 25px rgba(0,0,0,.2);
text-align:center;
}

.logo{
width:90px;
margin-bottom:15px;
}

h1{
font-size:24px;
color:#e65100;
margin-bottom:10px;
}

p{
color:#555;
margin-bottom:25px;
font-size:15px;
}

.btn{
display:block;
text-decoration:none;
padding:16px;
margin:15px 0;
border-radius:10px;
font-size:18px;
font-weight:bold;
transition:.3s;
color:#fff;
}

.whatsapp{
background:#25D366;
}

.whatsapp:hover{
background:#1fa855;
}

.form{
background:#ff6f00;
}

.form:hover{
background:#e65100;
}

.footer{
margin-top:25px;
font-size:13px;
color:#666;
}
</style>

</head>

<body>

<div class="card">

<h1>Akhil Bharatiya Vidyarthi Parishad (ABVP)</h1>

<p>
Welcome! Please choose an option below.
</p>

<a class="btn whatsapp"
href="https://chat.whatsapp.com/IExF1VpjwCN4t6nbsrKdAL"
target="_blank">
📱 Join WhatsApp Group
</a>

<a class="btn form"
href="https://docs.google.com/forms/d/1o4HMCqiArmM8gzuuIMGuHc1XXeT3JiHAcN6W6nB_I2k/viewform"
target="_blank">
📝 Membership Form
</a>

<div class="footer">
ABVP – Student First, Nation First 🇮🇳
</div>

</div>

</body>
</html>
